name: Docs Validator

on:
  push:
    branches: [develop, main]
    paths:
      - 'README.md'
      - 'README_ko.md'
      - 'ARCHITECTURE.md'
      - 'CHANGELOG.md'
      - 'docs/**'
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Documentation
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate documentation structure
        id: validate
        env:
          RUN_NUMBER: ${{ github.run_number }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set +e
          ERRORS=""
          WARNINGS=""

          validate_section() {
            local file="$1"
            local section="$2"
            if ! grep -q "## ${section}" "$file" 2>/dev/null; then
              ERRORS="${ERRORS}\n- [${file}] Missing section: ## ${section}"
            fi
          }

          validate_file_exists() {
            local file="$1"
            if [ ! -f "$file" ]; then
              ERRORS="${ERRORS}\n- Missing required file: ${file}"
            fi
          }

          # --- Required files ---
          validate_file_exists "README.md"

          # --- README.md section checks ---
          if [ -f "README.md" ]; then
            for section in "Features" "Quick Start" "Development" "License"; do
              validate_section "README.md" "$section"
            done
          fi

          # --- README_ko.md section checks (if exists) ---
          if [ -f "README_ko.md" ]; then
            for section in "기능" "빠른 시작" "개발" "라이선스"; do
              validate_section "README_ko.md" "$section"
            done
          fi

          # --- Internal link validation ---
          echo "Checking internal links..."
          for mdfile in README.md README_ko.md ARCHITECTURE.md CHANGELOG.md; do
            if [ ! -f "$mdfile" ]; then
              continue
            fi
            grep -oP '\[.*?\]\(\K(?!https?://)[^)]+' "$mdfile" 2>/dev/null | while read -r link; do
              target="${link%%#*}"
              if [ -n "$target" ] && [ ! -e "$target" ]; then
                printf 'BROKEN:%s:%s\n' "$mdfile" "$link"
              fi
            done
          done | sort -u > /tmp/broken_links.txt

          if [ -s /tmp/broken_links.txt ]; then
            while IFS= read -r line; do
              file_ref=$(printf '%s' "$line" | cut -d: -f2)
              link_ref=$(printf '%s' "$line" | cut -d: -f3)
              WARNINGS="${WARNINGS}\n- [${file_ref}] Broken internal link: ${link_ref}"
            done < /tmp/broken_links.txt
          fi

          # --- Code block fence check ---
          echo "Checking code block syntax..."
          FENCE="$(printf '%s' '```')"
          for mdfile in README.md README_ko.md ARCHITECTURE.md; do
            if [ ! -f "$mdfile" ]; then
              continue
            fi
            open_count=$(grep -c "^${FENCE}" "$mdfile" 2>/dev/null || echo 0)
            if [ $(( open_count % 2 )) -ne 0 ]; then
              ERRORS="${ERRORS}\n- [${mdfile}] Unmatched code fences (odd count: ${open_count})"
            fi
          done

          # --- Build report ---
          REPORT="## Documentation Validation Report\n\n"
          REPORT="${REPORT}**Run:** \`${RUN_NUMBER}\` | **Ref:** \`${REF_NAME}\`\n\n"

          if [ -z "$ERRORS" ]; then
            REPORT="${REPORT}### Errors\nNone\n\n"
            echo "has_errors=false" >> "$GITHUB_OUTPUT"
          else
            REPORT="${REPORT}### Errors\n${ERRORS}\n\n"
            echo "has_errors=true" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "$WARNINGS" ]; then
            REPORT="${REPORT}### Warnings\nNone\n\n"
          else
            REPORT="${REPORT}### Warnings\n${WARNINGS}\n\n"
          fi

          CHECKED=$(ls README.md README_ko.md ARCHITECTURE.md CHANGELOG.md 2>/dev/null | tr '\n' ' ')
          REPORT="${REPORT}### Checked Files\n\`${CHECKED}\`\n"

          printf "%b" "$REPORT" > /tmp/validation-report.md
          cat /tmp/validation-report.md

          if [ -n "$ERRORS" ]; then
            exit 1
          fi

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('/tmp/validation-report.md', 'utf8');
            } catch (e) {
              report = '## Documentation Validation Report\n\nReport file not found.';
            }

            const hasErrors = '${{ steps.validate.outputs.has_errors }}' === 'true';
            const status = hasErrors ? '\u274c Validation Failed' : '\u2705 Validation Passed';

            const body = `<!-- docs-validator -->\n### ${status}\n\n${report}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('<!-- docs-validator -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload validation artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docs-validation-report
          path: /tmp/validation-report.md
          retention-days: 7
