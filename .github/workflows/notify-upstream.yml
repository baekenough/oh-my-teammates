name: Upstream Sync Check

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check oh-my-customcode latest version
        id: check
        run: |
          CURRENT=$(node -p "require('./package.json').devDependencies['oh-my-customcode']" | sed 's/\^//')
          LATEST=$(npm view oh-my-customcode version 2>/dev/null || echo "unknown")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          if [ "$LATEST" != "unknown" ] && [ "$LATEST" != "$CURRENT" ]; then
            echo "outdated=true" >> $GITHUB_OUTPUT
          else
            echo "outdated=false" >> $GITHUB_OUTPUT
          fi

      - name: Create update issue if outdated
        if: steps.check.outputs.outdated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT: ${{ steps.check.outputs.current }}
          LATEST: ${{ steps.check.outputs.latest }}
        run: |
          EXISTING=$(gh issue list --search "bump oh-my-customcode dev dependency to $LATEST" --state open --json number --jq length)
          if [ "$EXISTING" -gt "0" ]; then
            echo "Issue already exists for v$LATEST, skipping"
            exit 0
          fi

          BODY=$(cat <<EOF
          ## Upstream Update Detected

          oh-my-customcode has a new version available.

          | | Version |
          |---|---------|
          | Current devDep | ^$CURRENT |
          | Latest available | $LATEST |

          ## Action Required
          - [ ] Review oh-my-customcode changelog for breaking changes
          - [ ] Update devDependencies in package.json
          - [ ] Run tests to verify compatibility

          *Auto-generated by Upstream Sync Check workflow.*
          EOF
          )

          gh issue create \
            --title "chore: bump oh-my-customcode dev dependency to $LATEST" \
            --body "$BODY" \
            --label "upstream-sync,automated"
