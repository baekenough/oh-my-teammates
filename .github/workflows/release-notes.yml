name: Release Notes Generator

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.2.3)"
        required: true
        type: string
      previous_tag:
        description: "Previous tag to compare (optional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-release-notes:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version from workflow_run
        if: github.event_name == 'workflow_run'
        id: from_run
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          TAG="$HEAD_BRANCH"
          # If head_branch doesn't look like a tag, find it from SHA
          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            TAG=$(git tag --points-at "$HEAD_SHA" | grep "^v" | head -1)
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Determine version from dispatch
        if: github.event_name == 'workflow_dispatch'
        id: from_dispatch
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          echo "tag=v${INPUT_VERSION}" >> $GITHUB_OUTPUT
          echo "version=${INPUT_VERSION}" >> $GITHUB_OUTPUT

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "tag=${{ steps.from_run.outputs.tag }}" >> $GITHUB_OUTPUT
            echo "version=${{ steps.from_run.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ steps.from_dispatch.outputs.tag }}" >> $GITHUB_OUTPUT
            echo "version=${{ steps.from_dispatch.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout release tag
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: git checkout "$RELEASE_TAG"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Find previous tag
        id: prev_tag
        env:
          CURRENT_TAG: ${{ steps.version.outputs.tag }}
          INPUT_PREVIOUS_TAG: ${{ inputs.previous_tag }}
        run: |
          if [ -n "$INPUT_PREVIOUS_TAG" ]; then
            echo "tag=$INPUT_PREVIOUS_TAG" >> $GITHUB_OUTPUT
          else
            PREV=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1)
            echo "tag=$PREV" >> $GITHUB_OUTPUT
          fi

      - name: Extract CHANGELOG section
        id: changelog
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "has_changelog=false" >> $GITHUB_OUTPUT
          else
            NOTES=$(awk "/^## \[${RELEASE_VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
            if [ -z "$NOTES" ]; then
              echo "has_changelog=false" >> $GITHUB_OUTPUT
            else
              echo "has_changelog=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate release notes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.OH_MY_CUSTOMCODE }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          PREVIOUS_TAG: ${{ steps.prev_tag.outputs.tag }}
        run: |
          bun run .github/scripts/generate-release-notes.ts "$RELEASE_VERSION" > release_notes.md
          cat release_notes.md

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: >-
            ${{ contains(steps.version.outputs.tag, '-alpha') ||
                contains(steps.version.outputs.tag, '-beta') ||
                contains(steps.version.outputs.tag, '-rc') }}

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-${{ steps.version.outputs.tag }}
          path: release_notes.md

      - name: Comment summary
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "## Release Notes Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: \`@oh-my-customcode/oh-my-teammates\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: \`${RELEASE_VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Install**: \`bun add -d @oh-my-customcode/oh-my-teammates\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat release_notes.md >> $GITHUB_STEP_SUMMARY
