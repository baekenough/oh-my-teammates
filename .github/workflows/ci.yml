name: CI

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Run tests with coverage
        run: bun test --coverage
      - name: Verify coverage threshold
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const summary = require('./coverage/coverage-summary.json');
              const total = summary.total;
              const fields = ['lines', 'statements', 'functions', 'branches'];
              const threshold = 99;
              let failed = false;
              for (const field of fields) {
                const pct = total[field].pct;
                if (pct < threshold) {
                  console.error('Coverage below threshold for ' + field + ': ' + pct + '% < ' + threshold + '%');
                  failed = true;
                } else {
                  console.log('Coverage OK for ' + field + ': ' + pct + '%');
                }
              }
              if (failed) process.exit(1);
            "
          else
            echo "::warning::coverage/coverage-summary.json not found — skipping threshold check"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
