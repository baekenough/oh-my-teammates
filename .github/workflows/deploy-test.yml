name: Deploy Test

on:
  pull_request:
    branches:
      - develop
      - 'release/**'

jobs:
  deploy-test:
    name: Deploy Test with Verdaccio
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Start Verdaccio
        run: |
          npm install -g verdaccio
          mkdir -p /tmp/verdaccio/storage
          cat > /tmp/verdaccio/config.yaml << 'EOF'
          storage: /tmp/verdaccio/storage
          auth:
            htpasswd:
              file: /tmp/verdaccio/htpasswd
              max_users: 1000
          uplinks:
            npmjs:
              url: https://registry.npmjs.org/
              timeout: 30s
          packages:
            '@oh-my-customcode/*':
              access: $all
              publish: $all
              proxy: false
            '@*/*':
              access: $all
              publish: $all
              proxy: npmjs
            '**':
              access: $all
              publish: $all
              proxy: npmjs
          log:
            type: stdout
            format: pretty
            level: http
          EOF
          verdaccio --config /tmp/verdaccio/config.yaml &
          sleep 5

      - name: Register test user and configure npm
        run: |
          # Register test user via Verdaccio REST API and capture token
          RESPONSE=$(curl -s -X PUT http://localhost:4873/-/user/org.couchdb.user:testuser \
            -H "Content-Type: application/json" \
            -d '{"name":"testuser","password":"testpass","email":"test@example.com","type":"user"}')
          echo "Verdaccio response: $RESPONSE"
          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('token',''))")
          echo "Token length: ${#TOKEN}"
          # Write registry and token to npmrc
          echo "registry=http://localhost:4873/" >> ~/.npmrc
          echo "//localhost:4873/:_authToken=${TOKEN}" >> ~/.npmrc

      - name: Publish to Verdaccio
        run: npm publish

      - name: Test global install
        run: |
          # oh-my-customcode is a peerDep not on npm yet; install with legacy-peer-deps
          npm install -g @oh-my-customcode/oh-my-teammates --registry http://localhost:4873/ --legacy-peer-deps

      - name: Test omcustom-team binary exists and runs
        run: |
          # Verify binary is installed and executable; CLI prints usage and exits 1 for unknown args
          omcustom-team 2>&1 | grep -q "Usage:" && echo "CLI is functional"

      - name: Test omcustom-team todo subcommand
        run: |
          omcustom-team todo 2>&1 | grep -q "Usage:" && echo "todo subcommand is functional"

      - name: Cleanup
        if: always()
        run: |
          pkill -f verdaccio || true
