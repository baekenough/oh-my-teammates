name: Deploy Test

on:
  pull_request:
    branches:
      - develop
      - 'release/**'

jobs:
  deploy-test:
    name: Deploy Test with Verdaccio
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Start Verdaccio
        run: |
          npm install -g verdaccio
          verdaccio &
          sleep 5

      - name: Configure npm for Verdaccio
        run: |
          npm config set registry http://localhost:4873/
          npm config set //localhost:4873/:_authToken "test-token"

      - name: Publish to Verdaccio
        run: |
          npm publish --registry http://localhost:4873/

      - name: Test global install
        run: |
          npm install -g @oh-my-customcode/oh-my-teammates --registry http://localhost:4873/

      - name: Test omcustom-team --version
        run: omcustom-team --version

      - name: Test omcustom-team --help
        run: omcustom-team --help

      - name: Cleanup
        if: always()
        run: |
          pkill -f verdaccio || true
