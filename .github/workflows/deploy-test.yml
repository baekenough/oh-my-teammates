name: Deploy Test

on:
  pull_request:
    branches:
      - develop
      - 'release/**'

jobs:
  deploy-test:
    name: Deploy Test with Verdaccio
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Start Verdaccio
        run: |
          npm install -g verdaccio
          mkdir -p /tmp/verdaccio/storage
          cat > /tmp/verdaccio/config.yaml << 'EOF'
          storage: /tmp/verdaccio/storage
          auth:
            htpasswd:
              file: /tmp/verdaccio/htpasswd
              max_users: -1
          packages:
            '@*/*':
              access: $all
              publish: $all
              proxy: false
            '**':
              access: $all
              publish: $all
              proxy: false
          log:
            type: stdout
            format: pretty
            level: http
          EOF
          verdaccio --config /tmp/verdaccio/config.yaml &
          sleep 5

      - name: Register test user and get token
        run: |
          # Register a test user via Verdaccio API and capture token
          TOKEN=$(curl -s -X PUT http://localhost:4873/-/user/org.couchdb.user:testuser \
            -H "Content-Type: application/json" \
            -d '{"name":"testuser","password":"testpass","email":"test@example.com","type":"user"}' \
            | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).token||''))")
          echo "//localhost:4873/:_authToken=${TOKEN}" >> ~/.npmrc
          npm config set registry http://localhost:4873/

      - name: Publish to Verdaccio
        run: npm publish

      - name: Test global install
        run: |
          npm install -g @oh-my-customcode/oh-my-teammates --registry http://localhost:4873/

      - name: Test omcustom-team --version
        run: omcustom-team --version

      - name: Test omcustom-team --help
        run: omcustom-team --help

      - name: Cleanup
        if: always()
        run: |
          pkill -f verdaccio || true
